ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    debug_out_file: /tmp/ekf_debug.txt

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Odom0 configuration (Wheel Odometry from DiffDrive plugin)
    odom0: /odometry
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false

    # Imu0 configuration (IMU sensor)
    imu0: /imu
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_queue_size: 10
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

    # GPS configuration (NavSatFix)
    # Note: robot_localization's ekf_node doesn't take NavSatFix directly.
    # It takes odometry messages. We need navsat_transform_node to convert GPS to Odometry.
    
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_nodelay: true
    odom1_differential: false
    odom1_relative: false
    
    use_control: false
