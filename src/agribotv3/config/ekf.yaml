# ──────────────────────────────────────────────
# Runtime profile: SIM (selected/default)
#   /odom_gt -> EKF -> /odometry/filtered
# EKF publishes odom -> base_link TF.
# Future HW profile (not enabled here):
#   /odometry + /imu -> EKF -> /odometry/filtered
# ──────────────────────────────────────────────
ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom          # EKF operates in odom frame

    publish_tf: true
    publish_acceleration: false

    # SIM profile source: ground_truth_odom publishes /odom_gt
    # from Gazebo dynamic poses.
    odom0: /odom_gt
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false

    # SIM profile keeps IMU fusion disabled to avoid overriding
    # ground-truth yaw in Gazebo.
    # For future HW profile, enable imu0 and switch odom0 to wheel odometry.
    # imu0: /imu
    # imu0_config: [false, false, false,
    #               true,  true,  true,
    #               false, false, false,
    #               true,  true,  true,
    #               true,  true,  true]
    # imu0_queue_size: 10
    # imu0_nodelay: true
    # imu0_differential: false
    # imu0_relative: true
    # imu0_remove_gravitational_acceleration: true

    use_control: false
