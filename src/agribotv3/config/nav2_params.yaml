# ══════════════════════════════════════════════════════════════
#  Nav2 params – agribotv3  (ROS 2 Jazzy / Nav2 Jazzy)
#
#  • No AMCL / map_server  (static map→odom TF instead)
#  • Sensors: 4 ultrasonics + detected_plants PointCloud2
#  • Odom topic: /odometry/filtered  (from robot_localization)
#  • base_frame: base_link  (matches URDF)
# ══════════════════════════════════════════════════════════════

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

# ─── Controller ───────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # DWB – simpler than MPPI, good fit for low-speed diff-drive ag-bot
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 1.0
      min_speed_theta: 0.0
      max_vel_theta: 1.0
      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.0
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle",
                "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ─── Planner ──────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

# ─── Smoother ─────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ─── Behaviors (was "recoveries_server" in Humble) ───────────
behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ─── Waypoint Follower ───────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ─── Velocity Smoother ───────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 2.0]
    min_velocity: [-1.0, 0.0, -2.0]
    max_accel: [1.0, 0.0, 2.0]
    max_decel: [-1.0, 0.0, -2.0]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ─── Collision Monitor ───────────────────────────────────────
collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # Simple circle polygons — no dependency on footprint topic
    polygons: ["PolygonStop", "PolygonSlow"]
    PolygonStop:
      type: "circle"
      radius: 0.4
      action_type: "stop"
      min_points: 3
      visualize: false
      polygon_pub_topic: "polygon_stop"
      enabled: true
    PolygonSlow:
      type: "circle"
      radius: 0.7
      action_type: "slowdown"
      slowdown_ratio: 0.5
      min_points: 3
      visualize: false
      polygon_pub_topic: "polygon_slow"
      enabled: true
    observation_sources: ["us1_scan", "us2_scan", "us3_scan", "us4_scan"]
    us1_scan:
      type: "scan"
      topic: "/ultra/us1/scan_fixed"
      enabled: true
    us2_scan:
      type: "scan"
      topic: "/ultra/us2/scan_fixed"
      enabled: true
    us3_scan:
      type: "scan"
      topic: "/ultra/us3/scan_fixed"
      enabled: true
    us4_scan:
      type: "scan"
      topic: "/ultra/us4/scan_fixed"
      enabled: true

# ─── Local Costmap ────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.35
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: us1 us2 us3 us4
        us1:
          topic: /ultra/us1/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
        us2:
          topic: /ultra/us2/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
        us3:
          topic: /ultra/us3/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
        us4:
          topic: /ultra/us4/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.8
      always_send_full_costmap: true

# ─── Global Costmap ───────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.05
      track_unknown_space: false
      rolling_window: false
      width: 20
      height: 20
      origin_x: -4.0
      origin_y: -10.0
      # No static_layer — we don't have a pre-built map
      plugins: ["obstacle_layer", "plant_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: us1 us2 us3 us4
        us1:
          topic: /ultra/us1/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
        us2:
          topic: /ultra/us2/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
        us3:
          topic: /ultra/us3/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
        us4:
          topic: /ultra/us4/scan_fixed
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.2
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      plant_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: plants
        plants:
          topic: /detected_plants
          data_type: "PointCloud2"
          clearing: false
          marking: true
          obstacle_max_range: 50.0
          obstacle_min_range: 0.0
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.8
      always_send_full_costmap: true
